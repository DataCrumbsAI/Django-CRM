services:

  db:
    image: postgres:16-alpine
    env_file: .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - type: bind
        source: ./docker/postgres/init-rls-user.sql
        target: /docker-entrypoint-initdb.d/init-rls-user.sql
        read_only: true
        is_directory: false
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.docker
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /bin/bash /entrypoint.sh

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A crm worker --loglevel=info
    exclude_from_hc: true

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A crm beat --loglevel=info
    exclude_from_hc: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env.docker
    expose:
      - "5173"

volumes:
  postgres_data:
